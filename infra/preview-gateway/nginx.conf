server {
  listen 8080;
  server_name _;
  root /artifacts;
  index index.html;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors http://localhost:3000" always;
  location / {
    try_files $uri $uri/ /index.html;
  }
}
