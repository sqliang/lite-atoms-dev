# SPA static hosting for the Lite Atoms Dev workbench.
# Client-side routes (e.g. /project/:id) must fall back to index.html so a browser
# refresh on a deep link does not 404. nginx-unprivileged listens on 8080.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; the HTML shell must always be revalidated.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
